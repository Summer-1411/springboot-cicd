name: CI/CD Docker Spring Boot  #Hiển thị tên workflow ở tab Action trên github

on:
  push:
    branches: [ "main" ] #Khi có push lên branch main thì workflow sẽ chạy, bạn có thể thay đổi thành branch khác nếu muốn

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest #Job này sẽ chạy trên 1 máy ảo Ubuntu do GitHub cung cấp

    steps:
      # =========================
      # 1. CHECKOUT CODE
      # =========================
      - name: Checkout code
        # WHAT: clone source code từ GitHub về runner
        # WHY: Docker build cần source code
        # HOW: GitHub Actions tự checkout vào /github/workspace
        uses: actions/checkout@v4

      # =========================
      # 2. CACHE MAVEN
      # =========================
      - name: Cache Maven dependencies
        # WHAT: cache thư viện Maven (~/.m2)
        # WHY: tránh download lại dependency mỗi lần build
        # HOW: dùng hash pom.xml để invalidate cache khi thay đổi
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # =========================
      # 3. GENERATE IMAGE TAG
      # =========================
      - name: Generate image tag
        # WHAT: tạo version image (run_number + timestamp)
        # WHY: dễ tracking + rollback version
        # HOW: lưu vào env IMAGE_TAG
        run: |
          echo "IMAGE_TAG=v${{ github.run_number }}.$(TZ='Asia/Ho_Chi_Minh' date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      # =========================
      # 4. LOGIN DOCKER HUB
      # =========================
      - name: Login Docker Hub
        # WHAT: đăng nhập DockerHub
        # WHY: cần quyền push image
        # HOW: dùng GitHub Secrets để bảo mật
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =========================
      # 5. BUILD & PUSH IMAGE
      # =========================
      - name: Build & Push Docker image
        # WHAT: build image từ Dockerfile + push lên DockerHub
        # WHY: VPS sẽ pull image này để chạy
        # HOW: dùng docker buildx action (chuẩn CI/CD hơn docker build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:latest

      # =========================
      # 6. DEPLOY TO VPS
      # =========================
      - name: Deploy to VPS
        # WHAT: SSH vào VPS để pull & run container
        # WHY: tách CI (build) và CD (deploy)
        # HOW: dùng SSH action + docker CLI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: 26266
          script: |

            docker ps -q --filter "label=project=springboot-cicd" | xargs -r docker stop
            docker ps -q --filter "label=project=springboot-cicd" | xargs -r docker rm

            docker pull ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:${{ env.IMAGE_TAG }}

            docker run -d \
              -p 8080:8080 \
              --name springboot-cicd-app \
              --label project=springboot-cicd \
              ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:${{ env.IMAGE_TAG }}


            docker images ${{ secrets.DOCKER_USERNAME }}/springboot-cicd \
              --format "{{.ID}}" \
              | tail -n +3 \
              | xargs -r docker rmi


