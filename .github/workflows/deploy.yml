name: CI/CD Docker Spring Boot

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # login dockerhub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # build image (multi-stage sẽ tự build jar)
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:latest .

      # push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:latest

      # deploy VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          script: |
            docker stop app || true
            docker rm app || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:latest
            docker run -d -p 8080:8080 --name app ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:latest