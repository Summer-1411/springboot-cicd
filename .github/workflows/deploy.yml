name: CI/CD with GitHub Actions  #Hiển thị tên workflow ở tab Action trên github

on:
  push:
    branches: [ "main" ] #Khi có push lên branch main thì workflow sẽ chạy, bạn có thể thay đổi thành branch khác nếu muốn

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest #Job này sẽ chạy trên 1 máy ảo Ubuntu do GitHub cung cấp

    steps:
      # =========================
      # 1. CHECKOUT CODE
      # =========================
      - name: Checkout code
        # WHAT: clone source code từ GitHub về runner
        # WHY: Docker build cần source code
        # HOW: GitHub Actions tự checkout vào /github/workspace
        uses: actions/checkout@v4

      # =========================
      # 2. CACHE MAVEN
      # =========================
      - name: Cache Maven dependencies
        # WHAT: cache thư viện Maven (~/.m2)
        # WHY: tránh download lại dependency mỗi lần build
        # HOW: dùng hash pom.xml để invalidate cache khi thay đổi
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      # =========================
      # 3. GENERATE IMAGE TAG
      # =========================
      - name: Generate image tag
        # WHAT: tạo version image (run_number + timestamp)
        # WHY: dễ tracking + rollback version
        # HOW: lưu vào env IMAGE_TAG
        run: |
          echo "IMAGE_TAG=v${{ github.run_number }}.$(TZ='Asia/Ho_Chi_Minh' date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      # =========================
      # 4. LOGIN DOCKER HUB
      # =========================
      - name: Login Docker Hub
        # WHAT: đăng nhập DockerHub
        # WHY: cần quyền push image
        # HOW: dùng GitHub Secrets để bảo mật
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =========================
      # 5. BUILD & PUSH IMAGE
      # =========================
      - name: Build & Push Docker image
        # WHAT: build image từ Dockerfile + push lên DockerHub
        # WHY: VPS sẽ pull image này để chạy
        # HOW: dùng docker buildx action (chuẩn CI/CD hơn docker build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/springboot-cicd:latest


      # =========================
      # 6. DEPLOY TO VPS (CÁCH 2 - NO GIT PULL)
      # =========================
      - name: Copy docker-compose + nginx to VPS
        # WHAT: copy file config từ repo sang VPS
        # WHY: VPS không còn git repo, chỉ nhận config
        # HOW: SCP từ GitHub runner → VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: 26266
          source: "docker-compose.yml,nginx/nginx.conf,promtail/promtail-config.yml"
          target: "/root/app"

      - name: Deploy to VPS
        # WHAT: SSH vào VPS để pull image + run container
        # WHY: tách build (GitHub) và run (VPS)
        # HOW: docker compose dùng image từ Docker Hub
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: 26266
          script: |
            cd /root/app

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export IMAGE_TAG=${{ env.IMAGE_TAG }}

            docker compose down
            docker compose pull
            docker compose up -d --force-recreate

            docker image prune -f


