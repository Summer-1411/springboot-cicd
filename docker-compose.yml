version: "3.8"

services:
  # =========================
  # 🔥 APP INSTANCES
  # =========================
  app1:
    image: ${DOCKER_USERNAME}/springboot-cicd:${IMAGE_TAG}
    container_name: app1
    environment:
      - INSTANCE_ID=app1
    restart: always

  app2:
    image: ${DOCKER_USERNAME}/springboot-cicd:${IMAGE_TAG}
    container_name: app2
    environment:
      - INSTANCE_ID=app2
    restart: always

  app3:
    image: ${DOCKER_USERNAME}/springboot-cicd:${IMAGE_TAG}
    container_name: app3
    environment:
      - INSTANCE_ID=app3
    restart: always

  # =========================
  # 🌐 NGINX LOAD BALANCER
  # =========================
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3

  # =========================
  # 📊 LOKI (LOG STORAGE)
  # =========================
  loki:
    image: grafana/loki:2.9.3
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  # =========================
  # 📥 PROMTAIL (LOG COLLECTOR)
  # =========================
  promtail:
    image: grafana/promtail:2.9.3
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # =========================
  # 📊 GRAFANA (UI)
  # =========================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

# =========================
# 💾 VOLUMES (GIỮ DATA)
# =========================
volumes:
  loki_data:
  grafana_data: