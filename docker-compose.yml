services:
  app1:
    image: ${DOCKER_USERNAME}/springboot-cicd:${IMAGE_TAG}
    ports:
      - "8081:8080"
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - INSTANCE_ID=app1


  app2:
    image: ${DOCKER_USERNAME}/springboot-cicd:${IMAGE_TAG}
    ports:
      - "8082:8080"
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - INSTANCE_ID=app2

  app3:
    image: ${DOCKER_USERNAME}/springboot-cicd:${IMAGE_TAG}
    ports:
      - "8083:8080"
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - INSTANCE_ID=app1

  nginx:
    image: nginx:latest
    container_name: nginx-lb

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app1
      - app2
      - app3

    restart: always