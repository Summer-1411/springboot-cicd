server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker

    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      # lấy tên container
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'

      # chỉ lấy app
      - source_labels: ['__meta_docker_container_name']
        regex: '/(app1|app2|app3)'
        action: keep

    pipeline_stages:
      - docker: {}

      # parse JSON log
      - json:
          expressions:
            level: level
            message: message
            app: app

      # extract instance
      - regex:
          expression: 'instance=(?P<instance>\w+)'

      - labels:
          level:
          instance:
          container: